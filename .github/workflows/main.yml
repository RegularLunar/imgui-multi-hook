name: Build

on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install premake5
        run: |
          curl -L https://github.com/premake/premake-core/releases/download/v5.0.0-beta4/premake-5.0.0-beta4-windows.zip -o premake.zip
          Expand-Archive premake.zip -DestinationPath premake
          echo "$env:GITHUB_WORKSPACE/premake" | Out-File -Append -FilePath $env:GITHUB_PATH

      - name: Generate project files
        run: premake5 vs2022

      - name: Build
        run: |
          & "C:/Program Files/Microsoft Visual Studio/2022/Enterprise/MSBuild/Current/Bin/MSBuild.exe" MultiHook.sln /p:Configuration=Release /p:Platform=x64
