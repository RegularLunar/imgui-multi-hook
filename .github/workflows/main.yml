name: Build

on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install premake5
        run: |
          curl -L https://github.com/premake/premake-core/releases/download/v5.0.0-beta4/premake-5.0.0-beta4-windows.zip -o premake.zip
          Expand-Archive premake.zip -DestinationPath premake
          echo "$env:GITHUB_WORKSPACE/premake" | Out-File -Append -FilePath $env:GITHUB_PATH

      - name: Generate project files
        run: premake5 vs2022

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        
      - name: Install Vulkan SDK
        run: |
          curl -L https://sdk.lunarg.com/sdk/download/latest/windows/vulkan-sdk.exe -o vulkan-sdk.exe
          ./vulkan-sdk.exe --accept-licenses --default-answer --confirm-command install
          echo "VULKAN_SDK=C:/VulkanSDK/$(ls C:/VulkanSDK)" | Out-File -Append -FilePath $env:GITHUB_ENV
        
      - name: Build
        run: msbuild MultiHook.sln /p:Configuration=Release /p:Platform=x64
